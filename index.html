<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Polymer Industries – Under Maintenance</title>
    <meta name="description" content="Our website is currently under maintenance. We'll be back soon!">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f14;
            color: #f0f0f0;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 30%, rgba(231, 76, 36, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 70%, rgba(231, 76, 36, 0.08) 0%, transparent 60%);
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            from { opacity: 0.6; }
            to   { opacity: 1; }
        }

        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 56px 48px;
            max-width: 480px;
            width: 90%;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.5);
            animation: fadeUp 0.8s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-wrap {
            margin-bottom: 36px;
        }

        .logo-wrap img {
            width: 120px;
            height: auto;
            filter: drop-shadow(0 4px 16px rgba(231, 76, 36, 0.35));
            transition: transform 0.3s ease;
        }

        .logo-wrap img:hover {
            transform: scale(1.05);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(231, 76, 36, 0.15);
            border: 1px solid rgba(231, 76, 36, 0.35);
            color: #f07048;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-radius: 100px;
            padding: 6px 16px;
            margin-bottom: 20px;
        }

        .badge::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #f07048;
            animation: blink 1.4s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.2; }
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.3;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin-bottom: 32px;
        }

        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 14px;
            padding: 14px 20px;
            text-decoration: none;
            color: inherit;
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
        }

        .contact-item:hover {
            background: rgba(231, 76, 36, 0.1);
            border-color: rgba(231, 76, 36, 0.35);
            transform: translateY(-2px);
        }

        .contact-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(231, 76, 36, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 18px;
        }

        .contact-text {
            text-align: left;
        }

        .contact-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 2px;
        }

        .contact-value {
            font-size: 14px;
            font-weight: 500;
            color: #f0f0f0;
        }
    </style>
</head>

<body>
    <div class="card">
        <!-- Logo -->
        <div class="logo-wrap">
            <img src="images/logo.png" alt="Echo Polymer Industries">
        </div>

        <!-- Status badge -->
        <div class="badge">Under Maintenance</div>

        <!-- Heading -->
        <h1>We'll be back shortly</h1>
        <p class="subtitle">Our website is currently undergoing scheduled maintenance.<br>Reach out to us directly in the meantime.</p>

        <div class="divider"></div>

        <!-- Contact details -->
        <div class="contact-list">
            <a href="tel:+919106928856" class="contact-item">
                <div class="contact-icon">📞</div>
                <div class="contact-text">
                    <div class="contact-label">Mobile</div>
                    <div class="contact-value">+91 91069 28856</div>
                </div>
            </a>
            <a href="mailto:echopolymer@gmail.com" class="contact-item">
                <div class="contact-icon">✉️</div>
                <div class="contact-text">
                    <div class="contact-label">Email</div>
                    <div class="contact-value">echopolymer@gmail.com</div>
                </div>
            </a>
        </div>
    </div>
</body>

</html>
